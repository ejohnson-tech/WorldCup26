  .hdr-title{font-size:18px;font-weight:600}
  .hdr-sub{font-size:12px;color:#aaa;margin-top:2px}
  .tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);padding:0 16px}
  .tab{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:11px 16px;border:none;background:none;cursor:pointer;color:var(--sub);border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab:hover{color:var(--text)}.tab.on{color:var(--text);border-bottom-color:var(--text)}
  .panel{display:none}.panel.on{display:block}
  .main{max-width:1080px;margin:0 auto;padding:16px 14px 48px}
  .sbar{display:flex;flex-wrap:wrap;gap:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:9px 14px;margin-bottom:16px;font-size:12px;color:var(--sub)}
  .sbar b{color:var(--text);font-family:'DM Mono',monospace}
  .lbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;margin-bottom:24px}
  .pc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
  .pc:hover{box-shadow:0 3px 12px rgba(0,0,0,.07)}.pc.lead{border-color:var(--green);border-width:2px}
  .ph{display:flex;align-items:center;justify-content:space-between;padding:11px 13px 9px;border-bottom:1px solid var(--border)}
  .pnr{display:flex;align-items:center;gap:8px}
  .av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
  .pn{font-size:14px;font-weight:600}
  .ptot{font-size:22px;font-weight:600;font-family:'DM Mono',monospace;line-height:1}
  .plbl{font-size:10px;color:var(--faint);text-align:right}
  .tl{padding:3px 0}
  .tr{display:flex;align-items:center;gap:7px;padding:5px 13px;font-size:12px}
  .tr:hover{background:var(--bg)}
  .tn{flex:1}.telim{color:var(--faint);text-decoration:line-through}
  .tp{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--sub);min-width:28px;text-align:right}
  .tp.pos{color:var(--green)}
  .ts{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--bg);color:var(--sub);white-space:nowrap}
  .ts.gs{background:var(--green-bg);color:var(--green)}.ts.r32{background:var(--blue-bg);color:var(--blue)}
  .ts.r16{background:var(--purple-bg);color:var(--purple)}.ts.qf{background:var(--orange-bg);color:var(--orange)}
  .ts.sf{background:var(--red-bg);color:var(--red)}.ts.fin{background:#fac775;color:var(--orange)}

  .fb{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--sub);cursor:pointer}

  .mt{font-size:11px;font-family:'DM Mono',monospace;color:var(--sub);min-width:54px}

// ─── COMPUTE STATS FROM SCORES ────────────────────────────────────────────────
function computeStats() {
  const stats = {};
  Object.values(ROSTERS).flatMap(r=>r.teams).forEach(t => stats[t]={gw:0,gd:0,gl:0,r32:0,r16:0,qf:0,sf:0,fin:0,elim:false});

  for (const m of SCHEDULE) {
    const key1 = `${m.t1} vs ${m.t2}`;
    const key2 = `${m.t2} vs ${m.t1}`;
    const scr = SCORES[key1] || (SCORES[key2] ? [SCORES[key2][1], SCORES[key2][0]] : null);
    if (!scr) continue;
    const [s1, s2] = scr;
    const t1 = m.t1, t2 = m.t2;
    if (m.grp) {
      if (!stats[t1]) stats[t1]={gw:0,gd:0,gl:0,r32:0,r16:0,qf:0,sf:0,fin:0,elim:false};
      if (!stats[t2]) stats[t2]={gw:0,gd:0,gl:0,r32:0,r16:0,qf:0,sf:0,fin:0,elim:false};
      if (s1>s2)      {stats[t1].gw++; stats[t2].gl++;}
      else if (s1<s2) {stats[t2].gw++; stats[t1].gl++;}
      else            {stats[t1].gd++; stats[t2].gd++;}
    } else {
      const w=s1>s2?t1:t2, l=s1>s2?t2:t1;
      if(stats[w]) stats[w][m.stage]++;
      if(stats[l]) stats[l].elim=true;
    }
  }
  return stats;
}

function calcPts(t, stats) {
  const d=stats[t]||{};
  return (d.gw||0)*3+(d.gd||0)*1+(d.r32||0)*5+(d.r16||0)*7+(d.qf||0)*9+(d.sf||0)*11+(d.fin||0)*15;
}
function stageInfo(t, stats) {
  const d=stats[t]||{};
  if(d.fin)return['Final Win','fin']; if(d.sf)return['Semifinal','sf'];
  if(d.qf)return['Quarterfinal','qf']; if(d.r16)return['Round of 16','r16'];
  if(d.r32)return['Round of 32','r32']; return['Group Stage','gs'];
}

// ─── RENDER BOARD ────────────────────────────────────────────────────────────
function render() {
  const stats = computeStats();
  const totals={};
  for(const[n,r]of Object.entries(ROSTERS)) totals[n]=r.teams.reduce((s,t)=>s+calcPts(t,stats),0);
  const sorted=Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  const ranks={}; sorted.forEach(([n],i)=>ranks[n]=i+1);

  document.getElementById('board').innerHTML = sorted.map(([name,total])=>{
    const r=ROSTERS[name], rank=ranks[name];
    const medal=rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'';
    const rows=r.teams.map((t,i)=>{
      const p=calcPts(t,stats), d=stats[t]||{};
      const [sl,sc]=stageInfo(t,stats);
      return `${i===5?'<div class="divl"></div>':''}<div class="tr">
        <span class="tn${d.elim?' telim':''}">${t}</span>
        <span class="ts ${sc}">${sl}</span>
        <span class="tp${p>0?' pos':''}">${p>0?'+'+p:'0'}</span>
      </div>`;
    }).join('');
    return `<div class="pc${rank===1?' lead':''}">
      <div class="ph"><div class="pnr">
        <div class="av" style="background:${r.bg};color:${r.color}">${r.init}</div>
        <span class="pn">${name} ${medal}</span>
      </div><div><div class="ptot">${total}</div><div class="plbl">pts</div></div></div>
      <div class="tl">${rows}</div></div>`;
  }).join('');
}

  for(const m of SCHEDULE)(byDate[m.date]=byDate[m.date]||[]).push(m);
  const DN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul'];
  function fmtD(d){const dt=new Date(d+'T12:00:00');return`${DN[dt.getDay()]}, ${MN[dt.getMonth()]} ${dt.getDate()}`;}
  function owners(m){const s=new Set();if(OWN[m.t1])s.add(OWN[m.t1]);if(OWN[m.t2])s.add(OWN[m.t2]);return[...s];}

  let html='';
  for(const date of Object.keys(byDate).sort()){
    const matches=byDate[date];
    const isToday=date===today, isPast=date<today;
    const famCount=matches.filter(m=>owners(m).length>0).length;
    const visible=matches.filter(m=>{
      const o=owners(m);
      if(schedFilter==='all')return true;
      if(schedFilter==='family')return o.length>0;
      return o.includes(schedFilter);
    });
    if(!visible.length)continue;

    html+=`<div class="db"><div class="dh"><span>${fmtD(date)}${isToday?' · Today':''}${isPast?' · Completed':''}</span><span class="dc">${famCount} family · ${matches.length} total</span></div>`;
    for(const m of matches){
      const o=owners(m);
      const vis=schedFilter==='all'||(schedFilter==='family'&&o.length>0)||o.includes(schedFilter);
      const o1=OWN[m.t1], o2=OWN[m.t2];
      const key1=`${m.t1} vs ${m.t2}`, key2=`${m.t2} vs ${m.t1}`;
      const scr=SCORES[key1]||(SCORES[key2]?[SCORES[key2][1],SCORES[key2][0]]:null);
      const chips=[...new Set([o1,o2].filter(Boolean))].map(p=>`<span class="och ${ROSTERS[p].chip}">${p}</span>`).join('');
      html+=`<div class="mc${o.length?' fm':''}${!vis?' hid':''}">
        <span class="mg">Grp ${m.grp}</span>
        <span class="mt">${m.time}</span>
        <div class="mts">
          <span class="tpill">${o1?`<span class="odot" style="background:${ROSTERS[o1].dot}"></span>`:''}${m.t1}</span>
          <span class="vs">vs</span>
          <span class="tpill">${o2?`<span class="odot" style="background:${ROSTERS[o2].dot}"></span>`:''}${m.t2}</span>
        </div>
        ${scr?`<span class="mscore">${scr[0]}–${scr[1]}</span>`:''}
        ${chips?`<div class="oc">${chips}</div>`:''}
        <span class="mv">${m.venue}</span>
      </div>`;
    }
    html+='</div>';
  }
  document.getElementById('sched-list').innerHTML=html;
}

function switchTab(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('p-'+id).classList.add('on');
  btn.classList.add('on');
}

render();
renderSchedule();
</script>
</body>
</html>
